name: Daily Track

on:
  schedule:
    - cron: "0 2 * * *"    # 10am MYT (2am UTC)
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch engagement metrics
        run: node scripts/track.mjs
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}

      - name: Commit updated engagement data
        run: |
          git config user.name "drawoheriter-bot"
          git config user.email "bot@drawoheriter"
          git add content/posted.json
          git diff --cached --quiet || git commit -m "Auto: track $(date +%Y-%m-%d)"
          git push
